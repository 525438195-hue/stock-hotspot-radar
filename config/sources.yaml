highest_priority_source_types:
  - government_policy
  - policy_file
  - exchange_announcement
  - exchange_disclosure
  - official_announcement

sentiment_only_source_types:
  - social_sentiment
  - social_media
  - guba
  - screenshot

search:
  base_keywords:
    - AI算力
    - 机器人
    - 低空经济
    - 半导体
    - 军工
    - 数据要素
    - 消费电子
    - 新能源
    - 医药
    - 证券
  max_results_per_query: 3
  max_queries_per_run: 12

tavily_search:
  max_results_per_query: 3
  search_depth: basic
  country: china
  include_domains:
    - eastmoney.com
    - finance.eastmoney.com
    - stock.eastmoney.com
    - cls.cn
    - stcn.com
    - cnstock.com
    - cs.com.cn
    - sse.com.cn
    - szse.cn
    - cninfo.com.cn
    - 10jqka.com.cn
    - hexun.com
    - jrj.com.cn
    - yicai.com
  exclude_domains:
    - wikipedia.org
    - zh.wikipedia.org
    - cloudflare.com
    - abb.com
    - google.com
    - youtube.com
    - facebook.com
    - reddit.com
    - medium.com
    - zhihu.com
    - baike.baidu.com

search_sources:
  tavily:
    enabled: true
    source_type: 搜索API
    priority: 3
    api_key_env: TAVILY_API_KEY

  google_cse:
    enabled: false
    source_type: 搜索API
    priority: 3
    api_key_env: GOOGLE_API_KEY
    cse_id_env: GOOGLE_CSE_ID

  newsapi:
    enabled: false
    source_type: 海外新闻
    priority: 3
    api_key_env: NEWSAPI_KEY

