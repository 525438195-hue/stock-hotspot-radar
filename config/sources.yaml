social_sources:
  manual_rumors:
    enabled: true
    source_type: 社媒情绪
    priority: 5
    file: data/manual_rumors.csv

  douyin_search:
    enabled: false
    source_type: 社媒情绪
    priority: 5
    mode: search_engine_indirect
    query_templates:
      - "site:douyin.com {keyword} A股"
      - "site:douyin.com {keyword} 涨停"
      - "site:douyin.com {keyword} 小道消息"
      - "site:douyin.com {keyword} 产业链"
